# =============================================================================
# Yazi theme — gruvbox dark (matches zellij theme)
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#d79921" }
hovered = { fg = "#282828", bg = "#d5c4a1" }
preview_hovered = { underline = true }
find_keyword = { fg = "#fabd2f", bold = true }
find_position = { fg = "#b16286", italic = true }
marker_selected = { fg = "#98971a", bg = "#98971a" }
marker_copied = { fg = "#d79921", bg = "#d79921" }
marker_cut = { fg = "#cc241d", bg = "#cc241d" }

[tabs]
active = { fg = "#282828", bg = "#d5c4a1", bold = true }
inactive = { fg = "#a89984", bg = "#3c3836" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#282828", bg = "#98971a", bold = true }
normal_alt = { fg = "#98971a", bg = "#3c3836", bold = true }
select_main = { fg = "#282828", bg = "#d79921", bold = true }
select_alt = { fg = "#d79921", bg = "#3c3836", bold = true }
unset_main = { fg = "#282828", bg = "#b16286", bold = true }
unset_alt = { fg = "#b16286", bg = "#3c3836", bold = true }

[status]
overall = { fg = "#d5c4a1", bg = "#3c3836" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#458588" }
perm_read = { fg = "#d79921" }
perm_write = { fg = "#cc241d" }
perm_exec = { fg = "#98971a" }
perm_sep = { fg = "#a89984" }
progress_label = { fg = "#d5c4a1", bold = true }
progress_normal = { fg = "#458588", bg = "#3c3836" }
progress_error = { fg = "#cc241d", bg = "#3c3836" }

[input]
border = { fg = "#d79921" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#458588" }
active = { fg = "#b16286" }
inactive = {}

[cmp]
border = { fg = "#458588" }
active = { fg = "#b16286" }
inactive = {}

[tasks]
border = { fg = "#458588" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#3c3836" }
cand = { fg = "#689d6a" }
rest = { fg = "#928374" }
desc = { fg = "#b16286" }
separator = "  "
separator_style = { fg = "#504945" }

[help]
on = { fg = "#689d6a" }
run = { fg = "#b16286" }
desc = {}
hovered = { bg = "#3c3836", bold = true }
footer = { fg = "#3c3836", bg = "#d5c4a1" }

[git]
modified = { fg = "#d79921" }
untracked = { fg = "#b16286" }
added = { fg = "#98971a" }
deleted = { fg = "#cc241d" }
updated = { fg = "#d65d0e" }
ignored = { fg = "#928374" }

[filetype]
rules = [
    { name = "*/", fg = "#458588", bold = true },
    { name = "*.rs", fg = "#d65d0e" },
    { name = "*.py", fg = "#d79921" },
    { name = "*.js", fg = "#d79921" },
    { name = "*.ts", fg = "#458588" },
    { name = "*.sh", fg = "#98971a" },
    { name = "*.toml", fg = "#689d6a" },
    { name = "*.yaml", fg = "#689d6a" },
    { name = "*.yml", fg = "#689d6a" },
    { name = "*.json", fg = "#689d6a" },
    { name = "*.kdl", fg = "#689d6a" },
    { name = "*.html", fg = "#d65d0e" },
    { name = "*.css", fg = "#458588" },
    { name = "*.md", fg = "#d5c4a1" },
    { name = "*.tex", fg = "#98971a" },
    { name = "*.typ", fg = "#98971a" },
    { name = "*.pdf", fg = "#cc241d" },
    { name = "*.png", fg = "#b16286" },
    { name = "*.jpg", fg = "#b16286" },
    { name = "*.jpeg", fg = "#b16286" },
    { name = "*.gif", fg = "#b16286" },
    { name = "*.svg", fg = "#b16286" },
    { name = "*.zip", fg = "#d65d0e" },
    { name = "*.tar*", fg = "#d65d0e" },
    { name = "*.gz", fg = "#d65d0e" },
    { name = "*.gitignore", fg = "#928374" },
    { name = ".env*", fg = "#cc241d" },
    { name = "Dockerfile*", fg = "#458588" },
    { name = "Makefile", fg = "#98971a" },
    { name = "Cargo.toml", fg = "#d65d0e", bold = true },
    { name = "Cargo.lock", fg = "#928374" },
]
