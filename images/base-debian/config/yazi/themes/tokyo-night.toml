# =============================================================================
# Yazi theme — tokyo night
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#7AA2F7" }
hovered = { fg = "#1A1B26", bg = "#C0CAF5" }
preview_hovered = { underline = true }
find_keyword = { fg = "#E0AF68", bold = true }
find_position = { fg = "#BB9AF7", italic = true }
marker_selected = { fg = "#9ECE6A", bg = "#9ECE6A" }
marker_copied = { fg = "#7AA2F7", bg = "#7AA2F7" }
marker_cut = { fg = "#F7768E", bg = "#F7768E" }

[tabs]
active = { fg = "#1A1B26", bg = "#C0CAF5", bold = true }
inactive = { fg = "#565F89", bg = "#283457" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#1A1B26", bg = "#9ECE6A", bold = true }
normal_alt = { fg = "#9ECE6A", bg = "#283457", bold = true }
select_main = { fg = "#1A1B26", bg = "#7AA2F7", bold = true }
select_alt = { fg = "#7AA2F7", bg = "#283457", bold = true }
unset_main = { fg = "#1A1B26", bg = "#BB9AF7", bold = true }
unset_alt = { fg = "#BB9AF7", bg = "#283457", bold = true }

[status]
overall = { fg = "#C0CAF5", bg = "#283457" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#7AA2F7" }
perm_read = { fg = "#E0AF68" }
perm_write = { fg = "#F7768E" }
perm_exec = { fg = "#9ECE6A" }
perm_sep = { fg = "#565F89" }
progress_label = { fg = "#C0CAF5", bold = true }
progress_normal = { fg = "#7AA2F7", bg = "#283457" }
progress_error = { fg = "#F7768E", bg = "#283457" }

[input]
border = { fg = "#7AA2F7" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#7AA2F7" }
active = { fg = "#BB9AF7" }
inactive = {}

[cmp]
border = { fg = "#7AA2F7" }
active = { fg = "#BB9AF7" }
inactive = {}

[tasks]
border = { fg = "#7AA2F7" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#283457" }
cand = { fg = "#7DCFFF" }
rest = { fg = "#565F89" }
desc = { fg = "#BB9AF7" }
separator = "  "
separator_style = { fg = "#3B4261" }

[help]
on = { fg = "#7DCFFF" }
run = { fg = "#BB9AF7" }
desc = {}
hovered = { bg = "#283457", bold = true }
footer = { fg = "#283457", bg = "#C0CAF5" }

[git]
modified = { fg = "#E0AF68" }
untracked = { fg = "#BB9AF7" }
added = { fg = "#9ECE6A" }
deleted = { fg = "#F7768E" }
updated = { fg = "#7AA2F7" }
ignored = { fg = "#565F89" }

[filetype]
rules = [
    { name = "*/", fg = "#7AA2F7", bold = true },
    { name = "*.rs", fg = "#FF9E64" },
    { name = "*.py", fg = "#E0AF68" },
    { name = "*.js", fg = "#E0AF68" },
    { name = "*.ts", fg = "#7AA2F7" },
    { name = "*.sh", fg = "#9ECE6A" },
    { name = "*.toml", fg = "#7DCFFF" },
    { name = "*.yaml", fg = "#7DCFFF" },
    { name = "*.yml", fg = "#7DCFFF" },
    { name = "*.json", fg = "#7DCFFF" },
    { name = "*.kdl", fg = "#7DCFFF" },
    { name = "*.html", fg = "#FF9E64" },
    { name = "*.css", fg = "#7AA2F7" },
    { name = "*.md", fg = "#C0CAF5" },
    { name = "*.tex", fg = "#9ECE6A" },
    { name = "*.typ", fg = "#9ECE6A" },
    { name = "*.pdf", fg = "#F7768E" },
    { name = "*.png", fg = "#BB9AF7" },
    { name = "*.jpg", fg = "#BB9AF7" },
    { name = "*.jpeg", fg = "#BB9AF7" },
    { name = "*.gif", fg = "#BB9AF7" },
    { name = "*.svg", fg = "#BB9AF7" },
    { name = "*.zip", fg = "#FF9E64" },
    { name = "*.tar*", fg = "#FF9E64" },
    { name = "*.gz", fg = "#FF9E64" },
    { name = "*.gitignore", fg = "#565F89" },
    { name = ".env*", fg = "#F7768E" },
    { name = "Dockerfile*", fg = "#7AA2F7" },
    { name = "Makefile", fg = "#9ECE6A" },
    { name = "Cargo.toml", fg = "#FF9E64", bold = true },
    { name = "Cargo.lock", fg = "#565F89" },
]
